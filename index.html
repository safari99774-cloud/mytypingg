
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTyping - SSC / RRB Typing Practice</title>
<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}
.container{
max-width:800px;
margin:auto;
background:#111827;
padding:25px;
border-radius:10px;
}
#text{
font-size:20px;
background:#1f2937;
padding:15px;
border-radius:8px;
margin:20px 0;
}
textarea{
width:100%;
height:120px;
font-size:18px;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}
button{
margin-top:15px;
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#22c55e;
color:black;
cursor:pointer;
}
.timer{
font-size:22px;
margin-top:10px;
color:#facc15;
}
</style>
</head>
<body>

<div class="container">
<h1>⌨️ MyTyping</h1>
<p>SSC / RRB Typing Practice Test</p>

<div class="timer" id="timer">Time: 60s</div>

<div id="text">
भारत एक कृषि प्रधान देश है। यहाँ की अधिकांश जनसंख्या गाँवों में रहती है और खेती पर निर्भर करती है। भारत की संस्कृति बहुत प्राचीन और समृद्ध मानी जाती है।
</div>

<textarea id="input" placeholder="यहाँ टाइप करना शुरू करें..."></textarea>
<br>
<button onclick="startTest()">Start Test</button>
<button onclick="finishTest()">Finish</button>

<p id="speed"></p>
<p id="accuracy"></p>
<p id="mistakes"></p>

</div>

<script>
let time = 60;
let timerStarted = false;
let interval;
let originalText = document.getElementById("text").innerText;

function startTest(){
if(timerStarted) return;
timerStarted = true;

interval = setInterval(()=>{
 time--;
 document.getElementById("timer").innerText = "Time: " + time + "s";
 if(time === 0){
   finishTest();
 }
},1000);
}

function finishTest(){
clearInterval(interval);

let typed = document.getElementById("input").value;
let words = typed.trim().split(/\s+/).filter(Boolean).length;
let speed = words;

let mistakes = 0;
for(let i=0;i<typed.length;i++){
 if(typed[i] !== originalText[i]){
   mistakes++;
 }
}

let accuracy = typed.length ? Math.max(0,((typed.length - mistakes)/typed.length)*100) : 0;

document.getElementById("speed").innerText = "Speed: " + speed + " WPM";
document.getElementById("accuracy").innerText = "Accuracy: " + accuracy.toFixed(2) + "%";
document.getElementById("mistakes").innerText = "Mistakes: " + mistakes;
}
</script>

</body>
</html>
